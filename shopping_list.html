<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin-left: 5px;
            cursor: pointer;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #e8e8e8;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Shopping List</h2>
        <input type="text" id="item" placeholder="Enter item">
        <button onclick="addItem()">Add</button>

        <ul id="list"></ul>
    </div>

    <script>
        function addItem() {
            const input = document.getElementById("item");
            const item = input.value.trim();

            if (item !== "") {
                const li = document.createElement("li");
                li.textContent = item;
                document.getElementById("list").appendChild(li);
                input.value = "";
            } else {
                alert("Please enter an item.");
            }
        }
    </script>

</body>

</html>
